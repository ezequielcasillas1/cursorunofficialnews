# Unofficial Cursor News API — deploy from repo root:
#   fly deploy --config mobile/server/fly.toml --build-context .
app = 'cursorunofficialnews'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'
  ignorefile = '.dockerignore'

[env]
  DATA_DIR = '/app/data'
  PORT = '8787'
  NODE_ENV = 'production'

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[mounts]
  source = 'cursorunofficialnews_data'
  destination = '/app/data'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
