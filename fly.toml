# fly.toml app configuration file generated for cursorunofficialnews on 2026-06-27T06:11:07Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'cursorunofficialnews'
primary_region = 'iad'

[build]
  dockerfile = 'mobile/server/Dockerfile'
  ignorefile = '.dockerignore'

[env]
  DATA_DIR = '/app/data'
  NODE_ENV = 'production'
  PORT = '8787'

[[mounts]]
  source = 'cursorunofficialnews_data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
