    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "@id": "https://cursorunofficial.news/#website",
            "url": "https://cursorunofficial.news/",
            "name": "Unofficial Cursor News",
            "description": "Unofficial Cursor news — changelog, releases, and updates. Not affiliated with Anysphere.",
            "publisher": { "@id": "https://cursorunofficial.news/#organization" },
            "inLanguage": "en"
          },
          {
            "@type": "Organization",
            "@id": "https://cursorunofficial.news/#organization",
            "name": "Unofficial Cursor News",
            "url": "https://cursorunofficial.news/",
            "logo": {
              "@type": "ImageObject",
              "@id": "https://cursorunofficial.news/#logo",
              "url": "https://cursorunofficial.news/brand/logo-icon.png",
              "contentUrl": "https://cursorunofficial.news/brand/logo-icon.png",
              "width": 512,
              "height": 512,
              "caption": "Unofficial Cursor News"
            }
          }
        ]
      }
    </script>
    <script>
      (function () {
        var key = 'cursor_news_theme';
        var theme = 'dark';
        try {
          var saved = localStorage.getItem(key);
          if (saved === 'light' || saved === 'dark') theme = saved;
        } catch (e) {
          /* ignore */
        }
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Editorial pairing: Bodoni Moda (Postoni-style display serif) + Libre Caslon Text (New Yorker-style body serif) + Libre Franklin (Franklin Gothic-style UI sans) -->

      href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,600;0,6..96,700&family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Libre+Franklin:wght@400;500;600;700&display=swap"

    />
