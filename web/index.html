<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Unofficial Cursor news — changelog, releases, and updates. Not affiliated with Anysphere."
    />
    <meta name="color-scheme" content="dark light" />
    <script>
      (function () {
        var key = 'cursor_news_theme';
        var theme = 'dark';
        try {
          var saved = localStorage.getItem(key);
          if (saved === 'light' || saved === 'dark') theme = saved;
        } catch (e) {
          /* ignore */
        }
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Editorial pairing: Bodoni Moda (Postoni-style display serif) + Libre Caslon Text (New Yorker-style body serif) + Libre Franklin (Franklin Gothic-style UI sans) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,600;0,6..96,700&family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Libre+Franklin:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Unofficial Cursor News</title>
    <!-- Google AdSense — static in head for site verification + auto ads -->
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5184491334740169"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
